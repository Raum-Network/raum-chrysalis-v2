<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12131C" />
      <stop offset="100%" stop-color="#1E2030" />
    </linearGradient>
  </defs>
  <!-- Base background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg-grad)" />
  <!-- A subtle outer ring to give it a premium layer -->
  <circle cx="16" cy="16" r="14.5" stroke="url(#arc-grad)" stroke-width="1.2" fill="none" opacity="0.3" />
  <!-- The stylized letter A formed by concentric arcs and geometric lines -->
  <g stroke="url(#arc-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left to right arched outer curve representing the A outline and the arc concept -->
    <path d="M9.5 22.5 C10.5 16, 12.5 9.5, 16 9.5 C19.5 9.5, 21.5 16, 22.5 22.5" />
    <!-- Center crossbar arched upwards -->
    <path d="M12.2 17.5 C14.2 16.2, 17.8 16.2, 19.8 17.5" />
  </g>
</svg>
